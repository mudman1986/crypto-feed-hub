name: Super-Linter

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: write
  statuses: write

jobs:
  lint:
    name: Lint Code Base
    uses: mudman1986/mudman-reusable/.github/workflows/reusable-super-linter.yml@e16cc3da9d3285e62068bb6499c7222d3d72b3da
    with:
      validate-all-codebase: false
      default-branch: main
