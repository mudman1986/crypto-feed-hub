name: Super-Linter

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: write
  statuses: write

jobs:
  lint:
    name: Lint Code Base
    uses: mudman1986/mudman-reusable/.github/workflows/reusable-super-linter.yml@26a152469998b624b672d1219b210bd319ea0ed9
    with:
      validate-all-codebase: false
      default-branch: main
